<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>boxsizing</title>
  <link rel="icon" type="image/x-icon" href="gemini.png">
  <style>
    *{
      margin: 0;
      /* body是有margin的，默认是8px，所以要把它设置为0。 */
      padding: 0;
      box-sizing: border-box;
      /* 表示元素的宽度和高度包括内容、内边距和边框，但不包括外边距。 */
    }

    .top1{
      width: 200px;
      height: 200px;
      padding: 10px;
      border: 10px solid black;
      background-color: yellow;
      margin-top: -50px;
      /* margin可以是负值，表示元素向相反的方向移动。这里的margin-top: -50px;表示元素向上移动50px。因为top1和top2的外边距重叠了，所以只移动了top2。 */
      /* 但是一般不用margin，用定位来移动元素，因为margin会影响元素的布局，而定位不会。 */
      margin-bottom: 50px;
      /* 移动的是top2而不是top1，因为top1的外边距和top2的外边距重叠了，所以只移动了top2。 */
    }
    .top2{
      width: 200px;
      height: 200px;
      padding: 10px;
      /* border: 10px solid black; */
      /* 给父元素用border可以解决margin塌陷的问题，因为border会阻止外边距的重叠。（也可以用padding） */
      overflow: hidden;
      /* 用overflow: hidden;也可以解决margin塌陷的问题，因为overflow: hidden;会创建一个新的块格式化上下文，阻止外边距的重叠。 */
      margin-left: 50px;
      margin:60px;
      /* margin控制方向和padding一样，都是上右下左。 */
      background-color: blue; 
    }
    .top2_5{
      width: 50px;
      height: 50px;
      margin:50px;
      /* margin塌陷了，因为top2_5的外边距和top2的外边距重叠了，所以只移动了top2_5。 */
      background-color: red; 
      /* 当兄弟元素中有margin时，数值大的margin会覆盖数值小的margin，这就是margin塌陷。因为top2_5的外边距和top2的外边距重叠了，所以只移动了top2_5。 */
    }
    span{
      margin: 10px;
      /* 注意行内元素的margin只会影响左右，不会影响上下，因为行内元素的高度是由字体大小决定的，而不是由margin决定的。 */
      border: 10px solid black;
    }

    .top3{
      width: 200px;
      height: 200px;
      border: 10px solid black;
      margin-left: 50px;
      margin:10px auto ;
      /* margin的值为auto时，表示元素水平居中。因为元素的宽度是200px，所以左右的外边距会自动分配，使元素居中。 */
      background-color: green; 
    }
  </style>
</head>
<body>
  <div class="top1"></div>
  <div class="top2">
    <div class="top2_5"></div>
  </div>

  <span>尼尼孩孩major冠军</span>
  <span>尼你害孩没这冠军</span>

  <div class="top3"></div>
</body>
</html>
