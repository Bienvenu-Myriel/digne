<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史上最杰出的军事家</title>
    <link rel="icon" href="gemini.png" type="image/png">
    <style>
       
        span.li01{
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            /* weight表示加粗，400是normal（加粗），700=bold（更粗），100-400=lighter（变细） */
        }
        
        span.li000{
            font-size: 16px;
            /* font是设置字体的关键词，里面还有family（字体）、style */
            font-style: italic;
            /* italic是倾斜 */
            font-family:"华文琥珀";
        }
        .lighter{
            font-weight: lighter;
        }
        @font-face {
            font-family:"花花字体" ; 
             /* 自己取个名字 */
            src: url();
            /* url不用多说了吧 */
        }
        
        .loyalty{
            text-align: center;
            /* align就是调整位置，center是正中间，left是默认right就是靠右 */
            text-shadow: 1px 1px rgba(230, 210, 110, 0.548);
            /* text-shadow: 水平 垂直 模糊 颜色;前两个必须写，后两个可选。 */
            text-indent:2em ;
            /* indent控制缩进,em是一个汉字的宽度，也可以用px */
             text-decoration:line-through;
            /* decoration来控制横线 line-through就是穿过文字的横线 */
            
        }
        div.angela{
            text-align: center;
            /* 给图片的父容器（比如 <div>）加 text-align: center，让容器内的行内内容（包括图片）居中： */
           
            
        }
    </style>

</head>
<body>
    <h1>人类历史上最杰出的军事家</h1>
    <ul>
        <li><span class="li01">top1:Napoleon Bonaparte</span></li>
        <li><span>top2:Arthur Wellesley Wellington</span></li>
        <li><span>top3:Erich von Manstein</span></li>
        <li><span class="lighter">top4:Heinz Wilhelm Guderian</span></li>
        <li><span class="lighter">top5:Bernard Law Montgomery</span></li>
        <li><span class="li000 lighter">仅评价以上几位</span></li>
    </ul>

    <div>
        <div class="loyalty">实际上历史上最杰出的军事家其实是金正恩将军</div>
        <div class="angela"><img src="AngelaFullBody.webp" alt=""></div>
    </div>
    
    
</body>
</html>
