<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>falcons</title>
    <link rel="icon" href="gemini.png" type="image/png">
    <style>
        /* 相邻兄弟选择器:选中下一个class */
        div.monesy+div{
            color: red;
        }
        /* 通用兄弟选择器 ，选中下面所有class*/
        div.monesy~div{
            background-color: green;
        }
        /* 属性选择器：选中属性符合要求的元素 */
        [class="zywoo"]{
            所有class="zywoo"都会被选中
            color: yellow;

        }
        /* 在所有div中找到class */
        div[class="vitality"]{
            color: yellow;

        }
        

        input[type="text"]{
            border: 1px solid red
        }
        input[type="button"]{
            height: 20px;
        }

        div[class*="t1"]{
            /* *=代表包含这个元素就会被选中 */
            color: red;
        }
          div[class^="lim"]{
            /* ^=代表这个元素在首位就会被选中 */
            color: blue;
        }
        /* 伪元素选择器 */
        div::first-letter{
            /* 开头的第一个字被选中，把letter换成line就是第一行被选中*/
            color: red;
        }
        div::selection{
            /* 被按住鼠标选中的内容会发生的变化 */
            color: greenyellow;
        }
        label::before{
            /* 在开头加上一段无法被按住鼠标选中的文本*，把before换成after就是在后面加一段 */
            content: "*";
            color: red;

        }


      
    </style>
</head>
<body>
    
    <div class="niko">
        <div class="monesy">1.27rating</div>
        <div class="kyousuke">1.20rating</div>
        <div class="donk">1.42rating</div>
    </div>

    <div class="vitality">team vitality</div>
    <div class="zywoo"></div>

    <form action="#">
    <label for="">请输入文本</label>
    <input type="text" value="">
    <br>
    
    <label for="">邮箱</label>
    <input type="email" name="" id="">
    <br>
    <label for=""></label>
    <input type="submit" value="提交">
    <button>点我也没用，要用java</button>
    <br>
    </form>

    <div class="skt-t1">skt-faker</div>
    <div class="t1">t1-faker</div>
    <div class="limbuscompany">钟表头但丁</div>

    <div class="city">都市最强竞选</div>
    <div class="boss">首脑</div>
    <div class="red">殷红迷雾</div>
    <div class="black">罗兰</div>
    <label for="">最终结果是：</label>
</body>
</html>
