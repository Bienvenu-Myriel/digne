<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="icon" href="gemini.png" type="image/png">

<body>
    <div>
        <video src="" controls loop muted></video>
        <!-- video和audio一样都有loop（循环播放）等属性，但是千万不要忘记加controls-->
    </div>
    <div>
        <audio src="" controls loop muted></audio>
    </div>
    <div><iframe width="560" height="315"src="https://www.youtube.com/embed/ujRwf1HdNjk?si=kQncLgJFFl5haR2l"frameborder="0"allowfullscreen></iframe></div>
    <!-- youtube的视频想要访问的话必须使用iframe然后在分享里找到embed -->

    <table width="500px" height="300px" border="1px solid black" cellspacing="0" cellpadding="15px">
        <!-- border是表格的线，1px是线的粗细,cellspacing就是单元格之间的空隙，cellpadding是单元格内元素离单元格左侧的距离  -->


        <!-- thead tbody caption tfoot都要在table里才能用 -->
        <caption>尼尼孩孩major冠军</caption>
           <!-- caption就是表格标题 -->
        <thead>
            <tr>
                <th>成员</th>
                <th>排名</th>
                <th>年龄</th>
                <th>位置</th>
                <!-- th是只能在thead里的列 -->
            </tr>
            <!-- tr是行 -->
        </thead>

        <tbody>
            <tr>
                <td>monesy</td>
                <td>top4</td>
                <td>20</td>
                <td>awper</td>
                <!-- thead外的列都是td，包括tfoot -->
            </tr>
            <tr>
                <td>niko</td>
                <td>top2</td>
                <td>29</td>
                <td>自由人</td>
            </tr>
            <tr>
                <td>kyousuke</td>
                <td>top20+</td>
                <td>18</td>
                <td>突破手</td>
            </tr>
            <tr>
                <td>k3</td>
                <td>top20+</td>
                <td>30</td>
                <td>指挥</td>
            </tr>
            <tr>
                <td>testes</td>
                <td>top20+</td>
                <td>27</td>

            </tr>
        </tbody>

        <tfoot></tfoot>
